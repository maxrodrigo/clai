version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - noctx
    - errorlint
    - gocritic
    - gosec
    - unparam
    - usestdlibvars

  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - goimports
